# Netlify config for Next.js
# The Next.js plugin runs after build and deploys the app via serverless/edge.
# In Netlify UI: Build & deploy → Build settings → Publish directory must be EMPTY.

[build]
  command = "bun run build"

[build.environment]
  NODE_VERSION = "24"
  NEXT_PUBLIC_SANITY_PROJECT_ID = "ed72g2cx"
  NEXT_PUBLIC_SANITY_DATASET = "production"
  # Set in Netlify UI (Site settings → Environment variables):
  # SANITY_API_READ_TOKEN — required for draft preview and live content
  # NEXT_PUBLIC_SANITY_PREVIEW_ORIGIN — your Netlify site URL (e.g. https://your-site.netlify.app)

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs.settings]
    preset = "desktop"

